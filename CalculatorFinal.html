<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="CalculatorFinal.css" />
  </head>
  <body>
    <p class="js-display css-display"></p>
    <p>
      <button class="number-button" onclick="updateCalculation('1');">1</button>
      <button class="number-button" onclick="updateCalculation('2');">2</button>
      <button class="number-button" onclick="updateCalculation('3');">3</button>
      <button class="operator-button" onclick="updateCalculation(' + ') ;">
        +
      </button>
    </p>
    <p>
      <button class="number-button" onclick="updateCalculation('4');">4</button>
      <button class="number-button" onclick="updateCalculation('5');">5</button>
      <button class="number-button" onclick="updateCalculation('6');">6</button>
      <button class="operator-button" onclick="updateCalculation(' - '); ">
        -
      </button>
    </p>
    <p>
      <button class="number-button" onclick="updateCalculation('7');">7</button>
      <button
        class="number-button"
        onclick="updateCalculation('8'); console.log(calculation);"
      >
        8
      </button>
      <button class="number-button" onclick="updateCalculation('9');">9</button>
      <button class="operator-button" onclick="updateCalculation(' * '); ">
        x
      </button>
    </p>
    <p>
      <button class="number-button" onclick="updateCalculation('0');">0</button>
      <button class="number-button" onclick="updateCalculation('.');">.</button>
      <button
        class="number-button"
        onclick="calculation=eval(calculation);document.querySelector('.js-display').innerHTML = calculation; localStorage.setItem('calculation', calculation); "
      >
        =
      </button>
      <button
        class="operator-button"
        onclick="calculation += ' / '; console.log(calculation);"
      >
        /
      </button>
    </p>
    <p>
      <button
        class="clear-button"
        onclick=";
        calculation = '';
        console.log(calculation);
        localStorage.setItem('calculation', calculation)
        document.querySelector('.js-display').innerHTML = ''
    
        "
      >
        Clear
      </button>
    </p>

    <script src="CalculatorFinal.js"></script>
  </body>
</html>
